<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Mi Reto | Cristina Uceda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #faf7f4;
  --white: #ffffff;
  --rosa: #d4879a;
  --rosa-light: #f0d5dc;
  --rosa-pale: #fbeef1;
  --mauve: #9e6070;
  --mauve-dark: #7a4555;
  --text: #3d2b32;
  --text-light: #9a7d85;
  --border: #ecdde2;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Montserrat',sans-serif; background:var(--cream); color:var(--text); min-height:100vh; }

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; background:var(--cream);
  display:flex; align-items:center; justify-content:center;
  z-index:999; flex-direction:column; gap:16px;
}
#loading p { font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--text-light); font-size:1.1rem; }
.spinner-lg { width:36px; height:36px; border:3px solid var(--rosa-light); border-top-color:var(--rosa); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HEADER ── */
header {
  background:var(--mauve-dark); padding:28px 20px 24px;
  text-align:center; position:relative;
}
.logo-wrap { display:flex; flex-direction:row; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; }
.logo-img { width:110px; height:110px; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15)); }
.header-titles { text-align:left; }
.header-titles h1 { font-family:'Cormorant Garamond',serif; font-size:2.1rem; font-weight:300; color:var(--white); line-height:1.15; }
.header-titles h1 em { font-style:italic; color:var(--rosa-light); }
.header-sub { margin-top:8px; font-size:0.62rem; font-weight:500; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.55); }

.btn-logout {
  position:absolute; top:16px; right:16px;
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.7); padding:6px 14px; border-radius:4px;
  font-family:'Montserrat',sans-serif; font-size:0.58rem; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
}
.btn-logout:hover { background:rgba(255,255,255,0.2); color:white; }

@media(max-width:480px){
  .logo-wrap { flex-direction:column; gap:12px; }
  .header-titles { text-align:center; }
  .btn-logout { top:12px; right:12px; }
}

/* ── SALUDO COMPACTO ── */
.saludo {
  text-align:center; padding:18px 20px 0;
  font-size:0.7rem; color:var(--text-light); letter-spacing:0.5px;
}
.saludo em {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:1rem; color:var(--mauve); font-weight:600;
}

/* ── SECCIONES ── */
.seccion { max-width:860px; margin:28px auto 0; padding:0 20px; }
.seccion-title { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.seccion-title .label-text { font-size:0.6rem; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--mauve); white-space:nowrap; }
.seccion-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }

/* ── CARD PLAN ACTUAL ── */
.card-plan-actual {
  background:var(--white); border:1px solid var(--border); border-radius:16px;
  padding:24px 28px; display:flex; align-items:center;
  justify-content:space-between; gap:24px;
  position:relative; overflow:hidden;
  transition:box-shadow 0.2s, border-color 0.2s;
}
.card-plan-actual:hover { box-shadow:0 4px 20px rgba(120,60,80,0.1); border-color:var(--rosa-light); }
.card-plan-actual::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--rosa),var(--mauve));
  transform:scaleX(0); transform-origin:left; transition:transform 0.3s;
}
.card-plan-actual:hover::after { transform:scaleX(1); }

.plan-actual-left { display:flex; align-items:center; gap:16px; flex:1; min-width:0; }
.plan-actual-num {
  width:52px; height:52px; border-radius:50%; flex-shrink:0;
  background:var(--rosa-pale); display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-size:1.5rem; color:var(--mauve-dark); font-weight:600;
}
.plan-actual-info { display:flex; flex-direction:column; gap:4px; min-width:0; }
.plan-actual-tag { font-size:0.58rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--rosa); }
.plan-actual-nombre { font-family:'Cormorant Garamond',serif; font-size:1.45rem; font-weight:400; color:var(--mauve-dark); line-height:1.2; }
.plan-actual-fecha { font-size:0.6rem; color:var(--text-light); margin-top:2px; }

.plan-actual-acciones { display:flex; flex-direction:column; gap:8px; flex-shrink:0; min-width:160px; }
.plan-actual-acciones .btn-plan { width:100%; justify-content:space-between; }

@media(max-width:600px){
  .card-plan-actual { flex-direction:column; align-items:flex-start; }
  .plan-actual-acciones { width:100%; min-width:unset; }
}

/* ── PLANES ANTERIORES ── */
.planes-anteriores {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  margin-top:14px; padding:12px 16px;
  background:var(--white); border:1px solid var(--border); border-radius:10px;
}
.planes-ant-label {
  font-size:0.57rem; font-weight:600; letter-spacing:2px;
  text-transform:uppercase; color:var(--text-light); white-space:nowrap; flex-shrink:0;
}
.planes-ant-sep { width:1px; height:14px; background:var(--border); flex-shrink:0; }
.plan-pill {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 11px; border-radius:20px;
  background:var(--cream); border:1px solid var(--border);
  text-decoration:none; color:var(--mauve);
  font-size:0.6rem; font-weight:600; letter-spacing:1px; text-transform:uppercase;
  transition:all 0.2s;
}
.plan-pill:hover { border-color:var(--rosa); color:var(--rosa); }

/* ── BOTONES PLAN ── */
.btn-plan {
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 16px; border-radius:8px;
  font-family:'Montserrat',sans-serif; font-size:0.62rem; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase;
  text-decoration:none; cursor:pointer; transition:all 0.2s; border:none;
}
.btn-ver  { background:var(--mauve-dark); color:white; }
.btn-ver:hover { background:var(--mauve); }
.btn-pdf  { background:transparent; border:1px solid var(--border) !important; color:var(--mauve); }
.btn-pdf:hover { border-color:var(--rosa) !important; color:var(--rosa); }
.btn-plan svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

/* ── ANEXOS STRIP ── */
.anexos-strip {
  display:flex; align-items:center; gap:14px;
  background:var(--white); border:1px solid var(--border); border-radius:12px;
  padding:16px 20px; text-decoration:none; color:inherit;
  transition:border-color 0.2s, box-shadow 0.2s; position:relative; overflow:hidden;
}
.anexos-strip:hover { border-color:var(--rosa-light); box-shadow:0 2px 12px rgba(120,60,80,0.07); }
.anexos-strip::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--rosa),var(--mauve));
  transform:scaleX(0); transform-origin:left; transition:transform 0.25s;
}
.anexos-strip:hover::after { transform:scaleX(1); }

.anexos-strip-icon {
  width:42px; height:42px; border-radius:50%; flex-shrink:0;
  background:var(--rosa-pale); display:flex; align-items:center; justify-content:center;
}
.anexos-strip-icon svg { width:18px; height:18px; fill:none; stroke:var(--mauve); stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
.anexos-strip-texto { flex:1; display:flex; flex-direction:column; gap:2px; }
.anexos-strip-tag { font-size:0.58rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--rosa); }
.anexos-strip-titulo { font-family:'Cormorant Garamond',serif; font-size:1.05rem; color:var(--mauve-dark); }
.anexos-strip-arrow { width:16px; height:16px; flex-shrink:0; fill:none; stroke:var(--text-light); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:stroke 0.2s; }
.anexos-strip:hover .anexos-strip-arrow { stroke:var(--rosa); }

/* ── SIN PLANES ── */
.empty-msg { text-align:center; padding:40px 20px; font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-style:italic; color:var(--text-light); }

footer { background:var(--white); border-top:1px solid var(--border); padding:20px; text-align:center; margin-top:52px; }
footer p { font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-light); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner-lg"></div>
  <p>Cargando tu espacio...</p>
</div>

<header>
  <button class="btn-logout" onclick="handleLogout()">Cerrar sesión</button>
  <div class="logo-wrap">
    <img src="logo.png" alt="Cristina Uceda" class="logo-img">
    <div class="header-titles">
      <h1><em>Mi Reto</em> Personal</h1>
      <p class="header-sub">Entrenamiento · Dietética · Nutrición</p>
    </div>
  </div>
</header>

<!-- SALUDO COMPACTO -->
<div class="saludo">Hola, <em id="nombreClienta">...</em> — aquí tienes todo lo que necesitas 💕</div>

<!-- PLANES -->
<section class="seccion">
  <div class="seccion-title">
    <span class="label-text">Mis Planes</span>
  </div>
  <div id="gridPlanes">
    <div class="empty-msg">Cargando tus planes...</div>
  </div>
</section>

<!-- ANEXOS -->
<section class="seccion" style="margin-bottom:0">
  <div class="seccion-title">
    <span class="label-text">Mis Anexos</span>
  </div>
  <a href="anexos/index.html" class="anexos-strip">
    <div class="anexos-strip-icon">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    </div>
    <div class="anexos-strip-texto">
      <div class="anexos-strip-tag">Guías · Recursos</div>
      <div class="anexos-strip-titulo">Mis anexos del reto</div>
    </div>
    <svg class="anexos-strip-arrow" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>
</section>

<footer>
  <p>© Cristina Uceda ✦ Documento privado ✦ Todos los derechos reservados ✦ by BHG 2026</p>
</footer>

<script>
  const SUPABASE_URL = 'https://dqojzchtwhqzogrozevy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_apcmOtkjMewxZzZ_JC9gcQ_UPT38IWq';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const iconArrow = `<svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
  const iconPDF   = `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }

    const { data: profile, error } = await sb
      .from('profiles')
      .select('id, nombre, rol')
      .eq('id', session.user.id)
      .single();

    if (error || !profile) { await sb.auth.signOut(); window.location.href = 'index.html'; return; }
    if (profile.rol === 'admin') { window.location.href = 'admin.html'; return; }

    document.getElementById('nombreClienta').textContent = profile.nombre;

    const { data: planes } = await sb
      .from('planes')
      .select('id, num_plan, fecha, plan_url, pdf_url')
      .eq('clienta_id', profile.id)
      .order('created_at', { ascending: true });

    renderPlanes(planes || []);
    document.getElementById('loading').style.display = 'none';
  }

  function renderPlanes(planes) {
    const container = document.getElementById('gridPlanes');

    if (!planes || planes.length === 0) {
      container.innerHTML = '<div class="empty-msg">Tu plan estará disponible muy pronto. 💕</div>';
      return;
    }

    // Más reciente = el actual; el resto = historial
    const actual     = planes[planes.length - 1];
    const anteriores = planes.slice(0, -1);
    const numActual  = planes.length;

    const botonesActual = actual.plan_url
      ? `<a href="visor.html?url=${encodeURIComponent(actual.plan_url)}" class="btn-plan btn-ver">Ver mi plan ${iconArrow}</a>
         ${actual.pdf_url ? `<a href="${actual.pdf_url}" target="_blank" class="btn-plan btn-pdf">Descargar PDF ${iconPDF}</a>` : ''}`
      : `<span style="font-size:0.62rem;color:var(--text-light);font-style:italic">Disponible pronto 💕</span>`;

    let html = `
      <div class="card-plan-actual">
        <div class="plan-actual-left">
          <div class="plan-actual-num">${numActual}</div>
          <div class="plan-actual-info">
            <div class="plan-actual-tag">Plan activo</div>
            <div class="plan-actual-nombre">${actual.num_plan || 'Plan ' + numActual}</div>
            ${actual.fecha ? `<div class="plan-actual-fecha">${actual.fecha}</div>` : ''}
          </div>
        </div>
        <div class="plan-actual-acciones">${botonesActual}</div>
      </div>`;

    if (anteriores.length > 0) {
      const pillsHTML = anteriores.map((p, i) => {
        const label = p.num_plan || ('Plan ' + (i + 1));
        const fecha  = p.fecha ? ' · ' + p.fecha : '';
        const href   = p.plan_url
          ? `visor.html?url=${encodeURIComponent(p.plan_url)}`
          : p.pdf_url || null;
        return href
          ? `<a href="${href}" ${p.pdf_url && !p.plan_url ? 'target="_blank"' : ''} class="plan-pill">${label}${fecha}</a>`
          : `<span class="plan-pill" style="opacity:0.5;cursor:default">${label}${fecha}</span>`;
      }).join('');

      html += `
        <div class="planes-anteriores">
          <span class="planes-ant-label">Anteriores</span>
          <span class="planes-ant-sep"></span>
          ${pillsHTML}
        </div>`;
    }

    container.innerHTML = html;
  }

  async function handleLogout() {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }

  init();
</script>
</body>
</html>
