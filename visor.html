<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Plan · RETO Cristina</title>

<!-- Icono para "Añadir a pantalla de inicio" -->
<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">

<!-- PWA: nombre y color cuando se guarda como app -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Plan · RETO Cristina">
<meta name="application-name" content="Mi Plan · RETO Cristina">
<meta name="theme-color" content="#7a4555">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fdf5fa; }

  #loading {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px; background:#fdf5fa; z-index:10;
    transition:opacity 0.3s;
  }
  .spinner {
    width:32px; height:32px;
    border:3px solid #f8a8d4; border-top-color:#e91e8c;
    border-radius:50%; animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading p { font-family:'Helvetica Neue',sans-serif; font-size:13px; color:#b07090; }

  #error {
    display:none; position:fixed; inset:0;
    align-items:center; justify-content:center;
    flex-direction:column; gap:12px;
    background:#fdf5fa; text-align:center; padding:20px;
  }
  #error p { font-size:14px; color:#7a4060; font-family:'Helvetica Neue',sans-serif; }
  #error a { font-size:13px; color:#e91e8c; text-decoration:none; border-bottom:1px solid #e91e8c; }

  #plan-frame {
    position:fixed; inset:0;
    width:100%; height:100%;
    border:none; display:none;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Cargando tu plan...</p>
</div>

<div id="error">
  <p>No se pudo cargar el plan. 💕<br>Inténtalo de nuevo.</p>
  <a href="dashboard.html">← Volver</a>
</div>

<iframe id="plan-frame" title="Plan de Cristina Uceda"></iframe>

<script>
  const SUPABASE_URL  = 'https://dqojzchtwhqzogrozevy.supabase.co';
  const SUPABASE_KEY  = 'sb_publishable_apcmOtkjMewxZzZ_JC9gcQ_UPT38IWq';
  const ALLOWED_HOST  = 'dqojzchtwhqzogrozevy.supabase.co';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display   = 'flex';
  }

  async function init() {
    // 1. Verificar sesión activa
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      sessionStorage.setItem('returnUrl', window.location.href);
      window.location.href = 'index.html';
      return;
    }

    // 2. Obtener y validar la URL del parámetro
    const params = new URLSearchParams(window.location.search);
    const url    = params.get('url');

    if (!url) { showError(); return; }

    try {
      const parsed = new URL(url);
      // Solo se permiten URLs del almacenamiento de Supabase del proyecto
      if (parsed.hostname !== ALLOWED_HOST) { showError(); return; }
    } catch {
      showError(); return;
    }

    // 2b. Leer género del perfil para aplicar tema
    const { data: profile } = await sb
      .from('profiles')
      .select('genero')
      .eq('id', session.user.id)
      .single();
    const esHombre = profile?.genero === 'hombre';

    // 3. Generar signed URL (bucket planes es privado)
    const publicMarker = '/object/public/planes/';
    const storagePath  = url.includes(publicMarker)
      ? url.split(publicMarker)[1]
      : url; // ya es un path o signed URL

    const { data: signed, error: signErr } = await sb.storage
      .from('planes')
      .createSignedUrl(storagePath, 3600);

    if (signErr || !signed?.signedUrl) { showError(); return; }

    // 4. Obtener el HTML y renderizarlo en el iframe via srcdoc
    //    (iframe src directo falla por X-Frame-Options de Supabase Storage;
    //     srcdoc inyecta el contenido como string y no le afectan esas cabeceras)
    let html;
    try {
      const res = await fetch(signed.signedUrl);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      html = await res.text();
    } catch {
      showError(); return;
    }

    // Aplicar tema masculino si procede
    if (esHombre) {
      html = html.replace('</head>',
        `<style>
          :root {
            --pink:#1976d2 !important;
            --pink-dark:#0d47a1 !important;
            --pink-soft:#90caf9 !important;
            --pink-bg:#e3f2fd !important;
            --pink-card:#bbdefb !important;
            --rose:#e3f2fd !important;
            --text2:#1a3a5c !important;
            --text3:#5b7fa6 !important;
          }
          .header { background:linear-gradient(135deg,#0d47a1 0%,#1976d2 60%,#42a5f5 100%) !important; }
          .food-dot { background:#90caf9 !important; }
          .obs-box { background:#e3f2fd !important; border-color:#90caf9 !important; }
          .tab-btn.active { color:#1976d2 !important; border-bottom-color:#1976d2 !important; }
          .bnav-btn.active { color:#1976d2 !important; }
        </style></head>`
      );
      html = html.replace('🌸', '💪');
    }

    const frame = document.getElementById('plan-frame');

    frame.onload = () => {
      document.getElementById('loading').style.display = 'none';
      frame.style.display = 'block';
    };

    frame.srcdoc = html;
  }

  init();
</script>
</body>
</html>
