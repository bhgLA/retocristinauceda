<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Plan | Cristina Uceda</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fdf5fa; }
  #loading {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px; background:#fdf5fa; z-index:10;
  }
  .spinner { width:32px; height:32px; border:3px solid #f8a8d4; border-top-color:#e91e8c; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading p { font-family:'Helvetica Neue',sans-serif; font-size:13px; color:#b07090; }
  #error { display:none; position:fixed; inset:0; align-items:center; justify-content:center; flex-direction:column; gap:12px; background:#fdf5fa; text-align:center; padding:20px; }
  #error p { font-size:14px; color:#7a4060; font-family:'Helvetica Neue',sans-serif; }
  #error a { font-size:13px; color:#e91e8c; text-decoration:none; border-bottom:1px solid #e91e8c; }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <p>Cargando tu plan...</p>
</div>
<div id="error">
  <p>No se pudo cargar el plan. 💕<br>Inténtalo de nuevo.</p>
  <a href="dashboard.html">← Volver</a>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const url    = params.get('url');
  if (!url) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display   = 'flex';
  } else {
    fetch(url)
      .then(r => { if (!r.ok) throw new Error('Error '+r.status); return r.text(); })
      .then(html => {
        document.open('text/html','replace');
        document.write(html);
        document.close();
      })
      .catch(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display   = 'flex';
      });
  }
</script>
</body>
</html>
